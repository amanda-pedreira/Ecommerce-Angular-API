<div class="container-login">

    <h1>Administrador</h1>

    <input type="text" name="usuario" id="usuario" placeholder="Digite seu usuário" [(ngModel)]="login">

    <input type="password" name="senha" id="senha" placeholder="Digite sua senha" [(ngModel)]="senha">

    <button (click)="onBotaoClicado()">
        Entrar
    </button>

</div>
