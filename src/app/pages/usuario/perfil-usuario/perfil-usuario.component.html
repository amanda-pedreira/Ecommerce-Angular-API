<div class="perfil">

    <div class="caixa-perfil">

        <div class="menu-lado">
            <div class="foto"></div>

            <h2>Meu Perfil</h2>
            <p>Cliente Power Store</p>

            <a class="selecionado">Meus dados</a>
            <a>Meus pedidos</a>
            <a>Endereços</a>
            <a class="sair">Sair da conta</a>
        </div>

        <div class="dados">
            <h1>Meus dados</h1>
            <p class="texto">Visualize e edite suas informações.</p>

            <div class="resumo">
                <div class="quadrado">
                    <span>Pedidos</span>
                    <b>3</b>
                </div>

                <div class="quadrado">
                    <span>Favoritos</span>
                    <b>5</b>
                </div>
            </div>

            <form>
                <div class="linha">
                    <div class="campo">
                        <label>Nome</label>
                        <input type="text" placeholder="Digite seu nome">
                    </div>

                    <div class="campo">
                        <label>Email</label>
                        <input type="email" placeholder="Digite seu email">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>Telefone</label>
                        <input type="text" placeholder="(11) 99999-9999">
                    </div>

                    <div class="campo">
                        <label>CPF</label>
                        <input type="text" placeholder="000.000.000-00">
                    </div>
                </div>

                <button>Salvar alterações</button>
            </form>
        </div>

    </div>

</div>
