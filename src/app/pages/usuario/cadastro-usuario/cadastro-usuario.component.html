<div class="cadastro">

    <div class="foto-cadastro">
        <div class="texto-foto">
            <span>POWER STORE</span>
            <h1>Evolua sua rotina fitness.</h1>
            <p>Produtos premium para foco, performance e resultados reais.</p>
        </div>
    </div>

    <div class="form-cadastro">
        <div class="topo-cadastro">
            <h2>Criar conta</h2>
            <p>Cadastre-se para acessar a plataforma.</p>
        </div>

        <form>
            <label>Nome</label>
            <input id="input-nome" class="input-simples" type="text" placeholder="Digite seu nome" [(ngModel)]="usuario.nome" name="nome">
            <div id="erro-nome" class="mensagem-erro"></div>

            <label>Email</label>
            <input id="input-email" class="input-simples" type="email" placeholder="Digite seu email" [(ngModel)]="usuario.email" name="email">
            <div id="erro-email" class="mensagem-erro"></div>

            <label>Telefone</label>
            <input id="input-telefone" class="input-simples" type="text" placeholder="(11) 99999-9999" [(ngModel)]="usuario.telefone" name="telefone">
            <div id="erro-telefone" class="mensagem-erro"></div>

            <label>Senha</label>
            <input id="input-senha" class="input-simples" type="password" placeholder="Digite sua senha" [(ngModel)]="usuario.senha" name="senha">
            <div id="erro-senha" class="mensagem-erro"></div>

            <button type="button" class="btn-cadastro" (click)="submeter()">Criar conta</button>

            <div class="login-link">
                <span>Já possui uma conta?</span><a routerLink="/login-usuario">Entrar</a>
            </div>
        </form>
    </div>

</div>
